name: Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Push Backend (✅ FIXED)
      - name: Build & Push Backend
        run: |
          docker build \
            --build-arg AWS_REGION=${{ secrets.AWS_REGION }} \
            --build-arg AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            --build-arg AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -t 0980943898/gostaff-demo:backend \
            -f backend/Dockerfile .

          docker push 0980943898/gostaff-demo:backend

      # 4. Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -t 0980943898/gostaff-demo:frontend -f frontend/Dockerfile .
          docker push 0980943898/gostaff-demo:frontend

      # 5. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/hrms-demo/gostaff.in

            echo "Pull latest images"
            docker pull 0980943898/gostaff-demo:backend
            docker pull 0980943898/gostaff-demo:frontend

            echo "Restart containers"
            docker compose --env-file docker/.env.prod -f docker-compose.prod.yml down
            docker compose --env-file docker/.env.prod -f docker-compose.prod.yml up -d

            echo "Cleanup old images"
            docker image prune -a -f
